<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Wetterstation</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .wert { font-size: 24px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Aktuelle Wetterdaten</h1>
        <p>Temperatur: <span id="temp" class="wert">Lädt...</span> °C</p>
        <p>Luftfeuchtigkeit: <span id="hum" class="wert">Lädt...</span> %</p>
        <small style="color: gray;">Letztes Update: <span id="zeit">-</span></small>
    </div>

    <script>
        // Lädt die von ioBroker hochgeladene wetter.json
        fetch('wetter.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('temp').innerText = data.temperatur;
                document.getElementById('hum').innerText = data.luftfeuchtigkeit;
                
                // Zeitstempel lesbar machen
                let date = new Date(data.zeitstempel);
                document.getElementById('zeit').innerText = date.toLocaleString('de-DE');
            })
            .catch(err => console.error("Fehler beim Laden der Wetterdaten:", err));
    </script>
</body>
</html>
